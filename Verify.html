<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Code</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
padding:20px;
}

.container{
width:100%;
max-width:420px;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:40px 30px;
border-radius:18px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
text-align:center;
color:white;
}

.card h2{
font-size:24px;
margin-bottom:10px;
}

.card p{
font-size:14px;
opacity:0.8;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
font-size:18px;
text-align:center;
letter-spacing:4px;
margin-bottom:20px;
outline:none;
background:rgba(255,255,255,0.2);
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#00e0a4;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#00c38f;
}

.msg{
margin-top:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>Verify Code</h2>
<p>Enter the verification code to continue</p>

<input type="text" id="otp" placeholder="● ● ● ● ● ●" maxlength="6">

<button onclick="verify()">VERIFY & CONTINUE</button>

<div class="msg" id="msg"></div>

</div>
</div>

<script>
function verify(){
    let otp = document.getElementById("otp").value;

    fetch("https://honeydew-bear-702897.hostingersite.com/big/api/verify.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({ otp })
    })
    .then(res => res.json())
    .then(data => {

        if(data.status === "success"){
            document.getElementById("msg").style.color = "lightgreen";
            document.getElementById("msg").innerText = "Verified ✅";

            setTimeout(()=>{
                window.location = "dashboard.html";
            },1000);

        } else if(data.status === "expired"){
            document.getElementById("msg").innerText = "OTP Expired ❌";

        } else {
            document.getElementById("msg").innerText = "Invalid OTP ❌";
        }

    });
}
</script>

</body>
</html>
