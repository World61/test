<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BigBasket | Secure Admin Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #3b82f6;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            padding: 20px;
        }

        .login-card {
            background: var(--glass-bg);
            padding: 45px 35px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        /* BigBasket Branding */
        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(45deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .login-card h2 {
            color: var(--text-main);
            margin-bottom: 35px;
            font-size: 1.2rem;
            font-weight: 400;
            opacity: 0.8;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
        }

        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            outline: none;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
            margin-top: 10px;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -5px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .msg {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
        }

        .error-text {
            color: #f87171;
            animation: shake 0.4s ease-in-out;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="brand-logo">BigBasket</div>
        <h2>Admin Portal Access</h2>

        <div class="input-group">
            <i class="bi bi-person"></i>
            <input type="text" id="user" placeholder="Username" spellcheck="false">
        </div>

        <div class="input-group">
            <i class="bi bi-lock"></i>
            <input type="password" id="pass" placeholder="Password">
        </div>

        <button id="loginBtn" onclick="login()">SIGN IN</button>

        <div class="msg" id="msg"></div>

        <div class="footer-text">
            <i class="bi bi-shield-check"></i> Secure Dashboard
        </div>
    </div>

    <script>
        // Enter key se bhi login ho jaye, iska feature:
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        function login() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    fetch("https://honeydew-bear-702897.hostingersite.com/bigstore/api/login.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({ user, pass })
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "otp_sent"){
            window.location.href = "Verify.html";
            
        } else {
            document.getElementById("msg").innerHTML = "Invalid Credentials ❌";
        }
    });
}
    </script>

</body>
</html>
