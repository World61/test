<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigBasket | Manage Products</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
:root {
    --primary-bg: #f1f5f9;
    --sidebar-bg: #0f172a;
    --accent-color: #3b82f6;
    --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

/* Body */
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--primary-bg);
    overflow-x: hidden;
}

/* Sidebar */
.sidebar {
    width: 260px;
    height: 100vh;
    background: var(--sidebar-bg);
    position: fixed;
    left: 0;
    top: 0;
    color: white;
    transition: 0.3s;
    z-index: 1000;
}

.sidebar-header {
    padding: 30px 25px;
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(45deg, #3b82f6, #2563eb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.nav-link {
    color: #94a3b8;
    padding: 14px 25px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    border-left: 4px solid transparent;
    transition: 0.3s;
}

.nav-link:hover,
.nav-link.active {
    color: white;
    background: rgba(255,255,255,0.05);
    border-left: 4px solid var(--accent-color);
}

/* Main Content */
.main-content {
    margin-left: 260px;
    padding: 2rem;
}

/* Table */
.table-container {
    background: white;
    border-radius: 20px;
    padding: 25px;
    box-shadow: var(--card-shadow);
    margin-top: 1.5rem;
}

.product-img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    border-radius: 10px;
}

.table thead th {
    background: #f8fafc;
    color: #64748b;
    font-size: 0.8rem;
    text-transform: uppercase;
}

/* Modal */
.modal-content {
    border-radius: 20px;
    border: none;
}

.form-control {
    border-radius: 10px;
    margin-bottom: 15px;
}

/* Mobile */
@media(max-width:992px){
    .sidebar { left: -260px; }
    .sidebar.active { left: 0; }
    .main-content { margin-left: 0; padding: 1rem; }
    .mobile-nav { display:flex !important; }
}

.mobile-nav {
    display: none;
    background: white;
    padding: 15px;
    justify-content: space-between;
    align-items: center;
}

/* Product Card (extra design - NOT removed) */
.product-card {
    display: flex;
    gap: 12px;
    background: white;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 12px;
}

.product-card img {
    width: 70px;
    height: 70px;
    border-radius: 10px;
    object-fit: cover;
}

.product-card .title {
    font-weight: 600;
    font-size: 14px;
}

.product-card .price {
    color: #3b82f6;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- Mobile Nav -->
<div class="mobile-nav">
    <h4 class="fw-bold text-primary m-0">BigBasket</h4>
    <button class="btn btn-dark" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-header">BigBasket</div>

    <a href="dashboard.html" class="nav-link">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <a href="#" class="nav-link active">
        <i class="bi bi-box-seam"></i> Products
    </a>

    <a href="tracking.html" class="nav-link">
        <i class="bi bi-geo-alt"></i> Tracking
    </a>

    <div class="p-4 d-lg-none">
        <button class="btn btn-danger w-100" onclick="toggleSidebar()">Close</button>
    </div>
</div>

<!-- Main -->
<div class="main-content">

<div class="d-flex justify-content-between align-items-center">
    <h2 class="fw-bold">Inventory Management</h2>

    <button class="btn btn-primary" onclick="openModal()">
        <i class="bi bi-plus-lg"></i> Add Product
    </button>
</div>

<div class="table-container">
<table class="table align-middle">
<thead>
<tr>
    <th>Image</th>
    <th>Product</th>
    <th>Price</th>
    <th>Rating</th>
    <th class="text-end">Action</th>
</tr>
</thead>

<tbody id="products"></tbody>
</table>
</div>

</div>

<!-- Modal -->
<div class="modal fade" id="modal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content p-4">

<h5 class="fw-bold">Add Product</h5>

<input id="title" placeholder="Product Name" class="form-control">

<div class="row">
<div class="col-6">
<input id="price" placeholder="Price" class="form-control">
</div>
<div class="col-6">
<input id="old" placeholder="Old Price" class="form-control">
</div>
</div>

<div class="row">
<div class="col-6">
<input id="rating" placeholder="Rating" class="form-control">
</div>
<div class="col-6">
<input id="reviews" placeholder="Reviews" class="form-control">
</div>
</div>

<input type="file" id="image" class="form-control">

<button onclick="add()" class="btn btn-primary w-100">Upload</button>

</div>
</div>
</div>

<script>
const API = "https://honeydew-bear-702897.hostingersite.com/big/api/";

function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("active");
}

/* LOAD */
function load(){
fetch(API+"get_products.php")
.then(res=>res.json())
.then(data=>{
let html="";

data.forEach(p=>{
html+=`
<tr>
<td>
<img src="https://honeydew-bear-702897.hostingersite.com/big/${p.image}"
class="product-img"
onerror="this.src='https://placehold.co/50x50?text=No+Img'">
</td>

<td>
<b>${p.title}</b><br>
<small>${p.reviews} Reviews</small>
</td>

<td>
<b class="text-primary">₹${p.price}</b><br>
<del>${p.old_price}</del>
</td>

<td>${p.rating}</td>

<td class="text-end">
<button onclick="edit(${p.id},'${p.title}',${p.price},${p.old_price},${p.rating},${p.reviews})">
Edit
</button>

<button onclick="del(${p.id})">
Delete
</button>
</td>
</tr>`;
});

document.getElementById("products").innerHTML = html || "No products";
});
}

load();

/* EDIT */
let editId=null;

function edit(id,title,price,old,rating,reviews){
editId=id;

titleEl = document.getElementById("title").value=title;
priceEl = document.getElementById("price").value=price;
oldEl = document.getElementById("old").value=old;
ratingEl = document.getElementById("rating").value=rating;
reviewsEl = document.getElementById("reviews").value=reviews;

new bootstrap.Modal(document.getElementById("modal")).show();
}

/* ADD */
function add(){
let fd=new FormData();

fd.append("title",title.value);
fd.append("price",price.value);
fd.append("old_price",old.value);
fd.append("rating",rating.value);
fd.append("reviews",reviews.value);
fd.append("image",image.files[0]);

fetch(API+"add_product.php",{method:"POST",body:fd})
.then(()=>location.reload());
}

/* DELETE */
function del(id){
if(confirm("Delete?")){
fetch(API+"delete_product.php?id="+id)
.then(()=>load());
}
}

/* OPEN MODAL */
function openModal(){
new bootstrap.Modal(document.getElementById("modal")).show();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
